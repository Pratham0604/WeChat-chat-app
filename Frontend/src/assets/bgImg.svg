<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1920" y2="1080">
            <stop offset="0%" stop-color="#F8FAFF"/>
            <stop offset="100%" stop-color="#EEF2FF"/>
        </linearGradient>

        <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
            <stop stop-color="#4F46E5"/>
            <stop offset="1" stop-color="#60A5FA"/>
        </linearGradient>

        <filter id="blur">
            <feGaussianBlur stdDeviation="60"/>
        </filter>
    </defs>

    <!-- Background -->
    <rect width="1920" height="1080" fill="url(#bg)"/>

    <!-- Soft Glow -->
    <circle cx="150" cy="900" r="250" fill="#60A5FA" opacity="0.15" filter="url(#blur)"/>
    <circle cx="1750" cy="850" r="300" fill="#8B5CF6" opacity="0.12" filter="url(#blur)"/>

    <!-- Network Lines -->
    <g opacity="0.15" stroke="#6366F1" stroke-width="2">
        <path d="M0 250 H250 L320 180 H500"/>
        <path d="M1420 650 H1650 L1720 580 H1920"/>
        <path d="M0 900 H420 L500 980 H700"/>
        <path d="M1280 250 H1550 L1650 150 H1920"/>
    </g>

    <!-- Nodes -->
    <g fill="#6366F1" opacity="0.5">
        <circle cx="250" cy="250" r="6"/>
        <circle cx="500" cy="180" r="6"/>
        <circle cx="1550" cy="650" r="6"/>
        <circle cx="1720" cy="580" r="6"/>
    </g>

    <!-- Chat Bubble Top Right -->
    <g transform="translate(1450 150)">
        <rect width="180" height="120" rx="28" fill="url(#accent)" opacity="0.9"/>
        <path d="M60 120 L90 145 L90 120" fill="url(#accent)"/>
        <circle cx="65" cy="60" r="8" fill="white"/>
        <circle cx="90" cy="60" r="8" fill="white"/>
        <circle cx="115" cy="60" r="8" fill="white"/>
    </g>

    <!-- Chat Bubble Bottom Left -->
    <g transform="translate(180 720)">
        <rect width="220" height="140" rx="32" fill="url(#accent)" opacity="0.85"/>
        <path d="M70 140 L105 170 L105 140" fill="url(#accent)"/>
        <circle cx="80" cy="70" r="10" fill="white"/>
        <circle cx="125" cy="70" r="10" fill="white"/>
        <circle cx="170" cy="70" r="10" fill="white"/>
    </g>

    <!-- Code Icon -->
    <g transform="translate(250 160)">
        <rect width="100" height="100" rx="24" fill="white" opacity="0.8"/>
        <path d="M35 50 L50 35 M35 50 L50 65" stroke="#4F46E5" stroke-width="5"/>
        <path d="M65 35 L50 50 M65 65 L50 50" stroke="#4F46E5" stroke-width="5"/>
    </g>

    <!-- Database Icon -->
    <g transform="translate(1350 780)">
        <rect width="100" height="100" rx="24" fill="white" opacity="0.8"/>
        <ellipse cx="50" cy="30" rx="25" ry="10" stroke="#4F46E5" stroke-width="4"/>
        <path d="M25 30 V60 C25 65 36 70 50 70 C64 70 75 65 75 60 V30"
              stroke="#4F46E5" stroke-width="4" fill="none"/>
    </g>

    <!-- Decorative Dots -->
    <g opacity="0.25" fill="#6366F1">
        <circle cx="120" cy="120" r="3"/>
        <circle cx="160" cy="120" r="3"/>
        <circle cx="200" cy="120" r="3"/>

        <circle cx="1250" cy="950" r="3"/>
        <circle cx="1290" cy="950" r="3"/>
        <circle cx="1330" cy="950" r="3"/>
    </g>

</svg>