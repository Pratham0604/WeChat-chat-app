<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#0a152d"/>
      <stop offset="60%" stop-color="#030714"/>
      <stop offset="100%" stop-color="#010205"/>
    </radialGradient>

    <filter id="neonGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14" result="blur1"/>
      <feGaussianBlur stdDeviation="28" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="ambientGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60" result="blur"/>
    </filter>

    <linearGradient id="frontRimGrad" x1="15%" y1="15%" x2="85%" y2="85%">
      <stop offset="0%" stop-color="#3effff"/>
      <stop offset="25%" stop-color="#2ca7ff"/>
      <stop offset="70%" stop-color="#aa40ff"/>
      <stop offset="100%" stop-color="#9616ff"/>
    </linearGradient>

    <linearGradient id="backRimGrad" x1="30%" y1="20%" x2="90%" y2="90%">
      <stop offset="0%" stop-color="#00beff"/>
      <stop offset="50%" stop-color="#0055ff"/>
      <stop offset="100%" stop-color="#7012ff"/>
    </linearGradient>

    <linearGradient id="dotLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7effff"/>
      <stop offset="40%" stop-color="#3190ff"/>
      <stop offset="100%" stop-color="#1948bd"/>
    </linearGradient>
    
    <linearGradient id="dotMid" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6faeff"/>
      <stop offset="50%" stop-color="#3d5eff"/>
      <stop offset="100%" stop-color="#2220a3"/>
    </linearGradient>

    <linearGradient id="dotRight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a67cff"/>
      <stop offset="50%" stop-color="#632eff"/>
      <stop offset="100%" stop-color="#310b8c"/>
    </linearGradient>

    <linearGradient id="weGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#39beff"/>
      <stop offset="60%" stop-color="#2d82ff"/>
      <stop offset="100%" stop-color="#4b5eff"/>
    </linearGradient>

    <linearGradient id="chatGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5646ff"/>
      <stop offset="45%" stop-color="#883eff"/>
      <stop offset="100%" stop-color="#b526ff"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="1000" fill="url(#bgGlow)"/>

  <g transform="translate(20, -10)">
    
    <circle cx="470" cy="400" r="220" fill="#143fff" opacity="0.15" filter="url(#ambientGlow)"/>
    <circle cx="530" cy="420" r="180" fill="#8020ff" opacity="0.12" filter="url(#ambientGlow)"/>

    <g filter="url(#neonGlow)" opacity="0.85">
      <path d="M 570,295 
               C 655,295 725,352 725,422 
               C 725,475 680,520 620,538
               L 628,582 
               C 630,588 622,592 617,588 
               L 556,547 
               C 544,549 532,550 520,550 
               C 435,550 365,493 365,422 
               C 365,352 435,295 520,295 Z" 
            fill="none" stroke="url(#backRimGrad)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <path d="M 570,295 C 655,295 725,352 725,422 C 725,475 680,520 620,538 L 628,582 C 630,588 622,592 617,588 L 556,547 C 544,549 532,550 520,550 C 435,550 365,493 365,422 C 365,352 435,295 520,295 Z" 
          fill="#04091a" opacity="0.5"/>


    <path d="M 430,190 C 545,190 640,268 640,365 C 640,438 580,500 495,526 L 507,592 C 510,602 498,608 490,601 L 400,540 C 383,543 366,545 350,545 C 235,545 140,467 140,365 C 140,268 235,190 350,190 Z" 
          fill="#020511" opacity="0.75"/>

    <g filter="url(#neonGlow)">
      <path d="M 430,190 
               C 545,190 640,268 640,365 
               C 640,438 580,500 495,526 
               L 507,592 
               C 510,602 498,608 490,601 
               L 400,540 
               C 383,543 366,545 350,545 
               C 235,545 140,467 140,365 
               C 140,268 235,190 350,190 Z" 
            fill="none" stroke="url(#frontRimGrad)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <path d="M 430,198 C 540,198 631,273 631,365 C 631,434 574,492 493,517 L 502,573 L 407,522 C 388,525 369,527 350,527 C 240,527 149,452 149,365 C 149,273 240,198 350,198 Z" 
          fill="#060d22" opacity="0.65" />

    <path d="M 165,340 C 175,245 260,212 365,212 C 480,212 585,250 610,330 C 570,240 480,226 365,226 C 255,226 185,260 165,340 Z" 
          fill="#ffffff" opacity="0.25"/>


    <g transform="translate(5, 5)">
      <circle cx="270" cy="365" r="21" fill="url(#dotLeft)"/>
      <circle cx="266" cy="360" r="19" fill="none" stroke="#a6ffff" stroke-width="1.5" opacity="0.6"/>
      
      <circle cx="355" cy="365" r="21" fill="url(#dotMid)"/>
      <circle cx="351" cy="360" r="19" fill="none" stroke="#d0e2ff" stroke-width="1.5" opacity="0.5"/>
      
      <circle cx="440" cy="365" r="21" fill="url(#dotRight)"/>
      <circle cx="436" cy="360" r="19" fill="none" stroke="#e0cfff" stroke-width="1.5" opacity="0.5"/>
    </g>

  </g>

  <g transform="translate(0, 20)">
    <text x="468" y="660" 
          font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
          font-weight="600" 
          font-size="124px" 
          letter-spacing="-2px"
          text-anchor="end" 
          fill="url(#weGrad)">We</text>
          
    <text x="468" y="660" 
          font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
          font-weight="600" 
          font-size="124px" 
          letter-spacing="-2px"
          text-anchor="start" 
          fill="url(#chatGrad)">Chat</text>

    <text x="500" y="718" 
          font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
          font-weight="500" 
          font-size="23px" 
          letter-spacing="8px" 
          text-anchor="middle" 
          fill="#ffffff" 
          opacity="0.45">Connect. Chat. Share.</text>
  </g>
</svg>
